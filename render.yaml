databases:
  - name: inventory-db
    plan: free
    databaseName: inventory_db
    user: inventory_user

services:
  - type: web
    name: inventory-backend
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://inventory-order-management.netlify.app,http://localhost:3000
